
services:
  postgres:
    image: postgres:alpine
    container_name: velo-postgres
    ports:
      - "5430:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data/data

  redis:
    image: redis:alpine
    container_name: velo-redis
    ports:
      - "6370:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data: